services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: build_your_own_rag_postgres
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    ports:
      - "5432:5432"
    volumes:
      - build_your_own_rag_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer
    container_name: build_your_own_rag_adminer
    profiles: ["tools"]
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  ollama:
    image: ollama/ollama:latest
    container_name: build_your_own_rag_ollama
    profiles: ["llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build: .
    container_name: build_your_own_rag_app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: rag_db
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      PYTHONPATH: /app/src
      EMBEDDING_MODEL_NAME: BAAI/bge-base-en-v1.5
      CHUNK_TARGET_TOKENS: 350
      CHUNK_OVERLAP_TOKENS: 50
      WORD_TOKEN_RATIO: 1.3
      DEFAULT_EXTRACTION_STRATEGY: FAST
      RRF_K: 60
    volumes:
      - .:/app
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  build_your_own_rag_pgdata:
  ollama_data:
